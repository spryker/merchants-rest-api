resource:
    name: Merchants
    shortName: merchants
    description: 'Storefront merchants'

    provider: Spryker\Glue\MerchantsRestApi\Api\Storefront\Provider\MerchantsStorefrontProvider

    paginationEnabled: false

    operations:
        - type: Get
          description: 'Retrieve a merchant by reference'

        - type: GetCollection
          uriTemplate: '/merchants'
          description: 'Retrieve a paginated list of merchants'
          openapiContext:
              parameters:
                  - name: 'page[limit]'
                    in: query
                    description: 'Maximum number of merchants per page.'
                    required: false
                    schema:
                        type: integer
                    example: 10
                  - name: 'page[offset]'
                    in: query
                    description: 'Offset of the first merchant to return (zero-based).'
                    required: false
                    schema:
                        type: integer
                    example: 0

    includes:
        - relationshipName: merchant-addresses
          targetResource: MerchantAddresses
          uriTemplate: /merchants/{merchantReference}/merchant-addresses
          uriVariableMappings:
              merchantReference: merchantReference
          # autoInclude: eagerly attach merchant-addresses without the client passing `?include=merchant-addresses`.
          # This mirrors the legacy Glue behaviour where merchant relationships were expanded automatically
          # whenever a merchant was pulled in alongside another primary resource (e.g. concrete-products).
          autoInclude: true
          # autoIncludeMinDepth: only auto-attach when `merchants` itself appears at depth >= 1, i.e. as a
          # nested include of another primary resource (e.g. `GET /concrete-products?include=merchants`).
          # On direct `GET /merchants` / `GET /merchants/{ref}` (depth 0) the relationship is NOT auto-attached
          # so the storefront listing stays lean; clients can still opt-in via `?include=merchant-addresses`.
          autoIncludeMinDepth: 1

        - relationshipName: merchant-opening-hours
          targetResource: MerchantOpeningHours
          uriTemplate: /merchants/{merchantReference}/merchant-opening-hours
          uriVariableMappings:
              merchantReference: merchantReference
          # autoInclude: eagerly attach merchant-opening-hours without the client passing
          # `?include=merchant-opening-hours`. Matches legacy Glue behaviour where opening hours were expanded
          # automatically alongside the parent merchant when merchants appeared as a related resource.
          autoInclude: true
          # autoIncludeMinDepth: only auto-attach when `merchants` is included at depth >= 1 (i.e. nested under
          # another primary resource). Direct `GET /merchants` responses (depth 0) skip this auto-include to
          # avoid loading opening-hours rows for every merchant in a listing; clients can still opt-in via
          # `?include=merchant-opening-hours`.
          autoIncludeMinDepth: 1

    properties:
        merchantReference:
            type: string
            identifier: true
            writable: false
            readable: true
            description: 'Unique merchant reference'
            openapiContext:
                example: 'MER000001'

        merchantName:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Merchant name'
            openapiContext:
                example: 'Spryker'

        merchantUrl:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Merchant storefront URL'
            openapiContext:
                example: '/en/merchant/spryker'

        contactPersonRole:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Contact person role'
            openapiContext:
                example: 'Customer Service Manager'

        contactPersonTitle:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Contact person title'
            openapiContext:
                example: 'Mr'

        contactPersonFirstName:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Contact person first name'
            openapiContext:
                example: 'Harald'

        contactPersonLastName:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Contact person last name'
            openapiContext:
                example: 'Schmidt'

        contactPersonPhone:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Contact person phone'
            openapiContext:
                example: '+49 30 208498350'

        logoUrl:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Merchant logo URL'
            openapiContext:
                example: 'https://cdn.acme.com/logo.png'

        publicEmail:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Public merchant email'
            openapiContext:
                example: 'spryker@acme.com'

        publicPhone:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Public merchant phone'
            openapiContext:
                example: '+49 30 208498350'

        description:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Merchant description'
            openapiContext:
                example: 'Spryker is the leading composable commerce platform.'

        bannerUrl:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Merchant banner URL'
            openapiContext:
                example: 'https://cdn.acme.com/banner.png'

        deliveryTime:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Estimated delivery time'
            openapiContext:
                example: '2-3 business days'

        faxNumber:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Fax number'
            openapiContext:
                example: '+49 30 208498351'

        legalInformation:
            type: array
            writable: false
            readable: true
            required: false
            description: 'Legal information block'
            openapiContext:
                example:
                    terms: 'Terms and conditions text'
                    cancellationPolicy: 'Cancellation policy text'
                    imprint: 'Imprint text'
                    dataPrivacy: 'Data privacy policy text'

        pagination:
            type: array
            writable: false
            readable: true
            required: false
            description: 'Pagination metadata for the merchant collection. Populated only on the first item of a GET /merchants response and consumed by PaginationLinksResponseSubscriber to emit JSON:API top-level pagination links.'
            openapiContext:
                properties:
                    numFound:
                        type: integer
                        example: 42
                    currentPage:
                        type: integer
                        example: 1
                    maxPage:
                        type: integer
                        example: 5
                    currentItemsPerPage:
                        type: integer
                        example: 10
                example:
                    numFound: 42
                    currentPage: 1
                    maxPage: 5
                    currentItemsPerPage: 10
